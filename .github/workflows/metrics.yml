name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: anishjethva18
          template: classic
          base: ""
          config_timezone: Asia/Kolkata
          
          # Language Plugin Settings
          plugin_languages: yes
          plugin_languages_ignored: html, css, json, xml, markdown # This forces it to focus on Java/Python/C
          plugin_languages_details: percentage
          plugin_languages_sections: most-used
          plugin_languages_limit: 8
          
          # Repository Settings
          repositories_batch: 200
          all: yes
